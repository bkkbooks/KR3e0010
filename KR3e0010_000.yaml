body:
  text: 肘後備急方醫家類提要臣等謹案肘後備急方八卷晉葛洪原撰初名肘後卒救方梁陶𢎞景補其闕漏得一百一首為肘後百一方金楊用道又取唐慎微證類本草諸方附于肘後隨證之下為附廣肘後方洎元世祖至元間有烏某者得其本于平鄉郭氏始刻而傳之段成已為之序稱葛陶二君共成此編而不及楊用道此本為明嘉靖中襄陽知府吕顒所刻始並列葛陶楊三序于卷首書中凡楊氏所增皆別題附方二字列之于後而葛陶二家之方則不加分析無可辨別案隋書經籍志葛洪肘後方六卷梁二卷陶𢎞景補闕肘後百一方九卷亡宋史藝文志止有葛書而無陶書是陶書在隋已亡不應元時復出又陶書原目九卷而此本合楊用道所附祗有八卷篇帙多寡亦不相合疑此書本無百一方在內特後人取𢎞景原序冠之耳書凡分五十一類有方無論不用難得之藥簡要易明雖頗經後來增損而大旨精切猶未失稚川本意云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀肘後備急方序醫有方古也古以來著方書者無慮數十百家其方殆未可以數計篇帙浩瀚苟無良醫師安所適從况窮鄉逺地有病無醫有方無藥其不罹夭折者幾希丹陽葛稚川夷考古今醫家之說驗其方簡要易得針灸分寸易曉必可以救人於死者為肘後備急方使有病者得之雖無韓伯休家自有藥雖無封君達人可以為醫其以備急固宜華陽陶𢎞景曰葛之此製利世實多但行之既久不無謬誤乃著百一方疏于備急之後訛者正之缺者補之附以炮製服食諸法纎悉備具仍區别內外他犯為三條可不費討尋開卷見病其以備急益宜葛陶二君世共知為有道之士於學無所不貫於術無所不通然猶積年僅成此編蓋一方一論已試而後録之非徒採其簡易而已人能家置一帙遇病得方方必己病如歷卞和之肆舉皆美玉入伯樂之廄無非駿足可以易而忽之邪葛自序云人能起信可免夭橫意可見矣自天地大變此方湮沒幾絶間一存者閟以自寶是豈制方本意連帥烏侯夙多疹疾宦學之餘留心于醫藥前按察河南北道得此方於平鄉郭氏郭之婦翁得諸汴之掖庭變亂之際與身存亡未嘗輕以示人逮今而出焉天也侯命工刻之以趣其成唯恐病者見方之晚也雖然方之顯晦而人之生死休感係焉出自有時而隱痛惻怛如是其急者不忍人之心也有不忍人之心斯有不忍人之政矣則侯之仁斯民也豈直一方書而已乎方之出乃吾仁心之發見者也因以序見命特書其始末以告夫未知者至元丙子季秋稷亭段成已題
