body:
  text: 肘後備急方卷八晉葛洪撰治百病備急丸散膏諸要方第六十九裴氏五毒神膏療中惡暴百病方雄黃朱砂當歸椒各二兩烏頭一升以苦酒漬一宿猪脂五斤東面陳蘆煎五上五下絞去滓內雄黃朱砂末攪令相得畢諸卒百病溫酒服如棗核一枚不差更服得下即除四肢有病可摩癰腫諸病瘡皆摩傅之夜行及病冒霧露皆以塗人身中佳效方并療時行瘟疫諸毒氣毒惡核金瘡等蒼梧道士陳元膏療百病方當歸天雄烏頭各三兩細辛芎藭朱砂各二兩乾薑附子雄黃各二兩半桂心白芷各一兩松脂八兩生地黃二斤搗絞取汁十三物别搗雄黃朱砂為末餘㕮咀以釅苦酒三升合地黃漬藥一宿取猪脂八斤微火煎十五沸白芷黃為度絞去滓內雄黃朱砂末攪令稠和密器貯之腹內病皆對火摩病上日兩三度從十日乃至二十日取病出差止四肢肥肉風瘴亦可酒溫服之如杏子大一枚主心腹積聚四支痺躄舉體風殘百病效方華他虎骨膏療百病虎骨野葛各三兩附子十五枚重九兩椒三升杏仁巴豆去心皮芎藭切各一升甘草細辛各一兩雄黃二兩十物苦酒漬用時猪脂六斤微煎三上三下完附子一枚視黃為度絞去滓乃內雄黃攪使稠和密器貯之百病皆摩傅上唯不得入眼若服之可如棗大內一合熱酒中須臾後拔白髮以傅處即生烏諸瘡毒風腫及馬鞍瘡等洗即差牛領亦然莽草膏療諸賊風腫痺風入五臟恍惚方莽草一斤烏頭附子躑躅各三兩四物切以水苦酒一升漬一宿猪脂四斤煎三上三下絞去滓向火以手摩病上三百度應手即差耳鼻病可以綿裹塞之療諸疥癬雜瘡隱居效驗方云并療手腳攣不得舉動及頭惡風背脅卒痛等蛇銜膏療癰腫金瘡瘀血産後血積耳目諸病牛領馬鞍瘡蛇銜大黃附子當歸芍藥細辛黃芩椒莽草獨活各一兩薤白十四莖十一物苦酒淹漬一宿猪脂三斤合煎於七星火上各沸絞去滓溫酒服如彈丸一枚日再病在外摩傅之耳以綿裹塞之目病如黍米注眥中其色緗黃一名緗膏南人又用龍銜藤一兩合煎名為龍銜膏神黃膏療諸惡瘡頭瘡百雜瘡方黃連黃蘗附子雄黃水銀藜蘆各一兩胡粉二兩七物細篩以臘月猪脂一斤和藥調器中急密塞口蒸五斗米下熟出內水銀又研令調密藏之有諸瘡先以鹽湯洗乃傅上無不差者隱居效驗方云此膏塗瘡一度即瘥時人為聖青龍五生膏療天下雜瘡方丹砂雄黃芎藭椒防已各五分龍膽梧桐皮柏皮青竹茹桑白皮蜂房蝟皮各四兩蛇蛻皮一具十三物切以苦酒浸半月微火煎少時乃內臘月猪脂三斤煎三上三下去滓以傅瘡上并服如棗核大神良隱居效驗方云主癰疽痔惡瘡等以前備急諸方故是要驗此來積用效者亦次于後云扁鵲陷水丸療內脹病并蠱疰中惡等及蜂百毒溪毒射工雄黃真丹砂别研礬石熬各一兩將生礬石三兩半燒之鬼臼一兩半蜈蚣一枚赤足者小炙斑猫去翅足龍膽附子炮各七枚藜蘆七分炙杏仁四十枚去尖皮熬搗篩蜜和搗千杵腹內脹病中惡邪氣飛尸遊走皆服二丸如小豆若積聚堅結服四丸取痢泄下蟲蛇五色若蟲疰病中惡邪飛尸遊走皆服二三丸以二丸摩痛上若蛇蜂百病苦中溪毒射工其服者視强弱大小及病輕重加減服之丹參膏療傷寒時行賊風惡氣在外即支節麻痛喉咽痺寒入腹則心急脹滿胸脅痞塞內則服之外則摩之并癱緩不隨風濕痺不仁偏枯拘屈口喎耳聾齒痛頭風痺腫腦中風動且痛若癰結核漏瘰􅊓堅腫未潰傅之取消及丹疹諸腫無頭狀似骨疽者摩之令消及惡結核走身中者風水遊腫亦摩之其服者如棗核大小兒以意減之日五服數用之悉效丹參蒴藋各三兩莽草葉躑躅花各一兩秦艽獨活烏頭川椒連翹桑白皮牛膝各二兩十二物以苦酒五升麻油七升煎令苦酒盡去滓用如前法亦用猪脂同煎之若是風寒冷毒可用酒服若毒熱病但單服牙齒痛單服之仍用綿裹嚼之比常用猪脂煎藥有小兒耳後􅕅子其堅如骨已經數月不盡以帛塗膏貼之二十日消盡神效無比此方出小品神明白膏療百病中風惡氣頭面諸病青盲風爛眥鼻耳聾寒齒痛癰腫疽痔金瘡癬疥悉主之當歸細辛各三兩吳茱茰芎藭蜀椒术前胡白芷各一兩附子三十枚九物切煎猪脂十斤炭火煎一沸即下三上三下白芷黃膏成去滓密貯看病在內酒服如彈丸一枚日三在外皆摩傅之目病如黍米內兩眥中以目向天風可扇之瘡蟲齒亦得傅之耳內底著亦療之緩風冷者宜用之成膏清麻油十三兩菜油亦得黃丹七兩二物鐵鐺文火煎粗濕栁批箆攪不停至色黑加武火仍以扇扇之攪不停烟斷絶盡看漸稠膏成煎須淨處勿令雞犬見齒瘡帖痔瘡服之藥子一物方婆羅門胡名船疏樹子國人名藥療病唯須細研勿令粗皆取其中仁去皮用之療諸疾病方卒得吐瀉霍亂蠱毒臍下絞痛赤痢心腹脹滿宿食不消蛇螫毒入腹被毒箭入腹并服二枚取藥子中仁暖水二合研碎服之疽瘡附骨疽腫疔瘡癰腫此四病量瘡腫大小用藥子中仁暖水碎和猪膽封上癤腫冷遊腫癬瘡此五病用醋研封上蛇螫惡毛蝎蜈蚣等螫沙虱射工此六病用暖水研赤莧和封之婦人難産後腹中絞痛及惡露不止痛中瘀血下此六病以一枚一杯酒研溫服之帶下暴下此二病以栗汁研溫服之齲蟲食齒細削內孔中立愈其搗末篩著瘡上甚生肌肉此法出支家大醫本方服鹽方療暴得熱病頭痛目眩并卒心腹痛及欲霍亂痰飲宿食及氣滿喘息久下赤白及積聚吐逆之氣少力顔色痿黃瘴瘧諸風其服法取上好鹽先以大豆許口中含勿咽須臾水當滿口水近齒更用方寸七抄鹽內口中與水一時咽不爾或令消盡喉若久病長服者至二三月每旦先服或吐或安係卒病可服三方寸匕取即吐痢不吐病痢更加服新患瘧者即差心腹痛及滿得吐下亦佳久病每上以心中熱為善三五日亦服佳加服取吐痢痢不損人久服大補奔豚腎氣五石無不差之病但恨人不服不能久取此療方不一小品云卒心痛鬼氣宿食不消霍亂氣滿中毒鹹作湯服一二升㓨便吐之良葛氏常備藥大黃桂心甘草乾薑黃連椒术吳茱茰熟艾雄黃犀角麝香菖蒲人參芍藥附子巴豆半夏麻黃柴胡杏仁葛根黃芩烏頭秦艽等此等藥並應各少許以前諸藥固以大要嶺南使用仍開者今復疏之衆藥并成劑藥自常和合貯此之備最先於衣食耳常山十四兩蜀漆石膏一斤阿膠七兩牡礪朱砂大青各七兩鱉三枚鯪鯉甲一斤烏賊魚骨馬藺子一大升蜀升麻十四兩檳榔五十枚龍骨赤石脂羚羊角三枚橘皮獨活其不注兩數者各四兩用芒硝一升良成劑藥金牙散玉壺黃丸三物備急藥紫雪丹參茵草膏玉黃丸度瘴散末散理中散痢藥疔腫藥其有側注者隨得一種為佳老君神明白散术附子炮各二兩烏頭炮桔梗二兩細辛一兩搗篩旦服五方寸匕若一家有藥則一里無病帶行者所遇病氣皆削若他人得病者溫酒服一方寸七若已四五日者以散三七水三升煮二沸服一升取汗即愈又常用辟病散真珠桂肉各一分貝母三分杏仁二分熬雞子白熬令黃黑三分五物搗篩嵗旦服方寸七若嵗中多病可月月朔望服單行方南向社中柏東向枝取曝乾末服方寸七姚云疾疫流行預備之名為柏枝散服神良删煩方云旦南行見社中柏即便收取之斷瘟病令不相染方熬䜴新米酒漬常服之小品正朝屠蘇酒法令人不病瘟疫大黃五分川椒五分术桂各三分桔梗四分烏頭一分袚褉二分七物細切以絹囊貯之十二月晦日正中時懸置井中至泥正曉拜慶前出之正旦取藥置酒中屠蘇飲之於東向藥置井中能迎嵗可世無此病此華他法武帝有方驗中從小至大少隨所堪一人飲一家無患飲藥三朝一方有防風一兩姚大夫辟瘟病粉身方芎藭白芷藁本三物等分下篩內粉中以塗粉於身大良附方張仲景三物備急方司空裴秀為散用療心腹諸疾卒暴百病用大黃乾薑巴豆各一兩須精新好者搗篩蜜和更搗一千杵丸如小豆服三丸老小斟量之為散不及丸也若中惡客忤心腹脹滿卒痛如錐刀刺痛氣急口噤停尸卒死者以暖水若酒服之若不下捧頭起灌令下喉須臾差未知更與三丸腹當鳴轉即吐下便愈若口已噤亦須折齒灌之藥入喉即瘥崔氏海上方云威靈仙去衆風通十二經脈此藥朝服暮效疏宣五臟冷膿宿水變病微利不瀉人服此四肢輕健手足溫暖並得清涼時商州有人患重足不履地經十年不瘥忽遇新羅僧見云此疾有藥可理遂入山求之遣服數日平復後留此藥名而去此藥治丈夫婦人中風不語手足不隨口眼喎斜筋骨節風胎風頭風暗風心風風狂人傷寒頭痛鼻清涕服經二度傷寒即止頭旋目眩白癜風極治大風皮膚風癢大毒熱毒風瘡深治勞疾連腰骨節風繞腕風言語澀滯痰積宣通五臟腹內宿滯心頭痰水膀胱宿膿口中涎水好喫茶漬手足頑痺冷熱氣壅腰膝疼痛久立不得浮氣瘴氣憎寒壯熱頭痛尤甚攻耳成膿而聾又衝眼赤大小腸祕服此立通飲食即進黃疸黑疸面無顔色瘰􅕅遍項産後袐澀暨腰痛曽經損墜心痛注氣膈氣冷氣攻衝腎臟風壅腹吐脹滿頭面浮腫注毒脾肺氣痰熱咳嗽氣急坐卧不安疥癬等瘡婦人月水不來動經多日血氣衝心隂汗盜汗鴉臭穢甚氣息不堪勤服威靈仙更用熱湯盡日頻洗朝塗若唾若治鴉臭藥自塗身上內外塗之當得平愈孩子無辜令母含藥灌之痔疾祕澀氣痢絞結並皆治之威靈仙一味洗焙為末以好酒和令微濕入在竹筒內牢塞口九蒸九曝如乾添酒重灑之以白蜜和為丸如桐子大每服二十至三十丸湯酒下千金方當以五月五日午時附地刈取葈耳葉洗曝燥搗下篩酒若漿水服方寸七日三夜三散若吐逆可蜜和為丸準計一方匕數也風輕易治者日再服若身體有風處皆作粟肌出或如麻豆粒此為風毒出也可以釙刺潰去之皆黃汁出乃止五月五日多取隂乾著大甕中稍取用之此草辟惡若欲省病省疾者便服之令人無所畏若時氣不和舉家服之若病胃脹滿心悶發熱即服之並殺三蟲腸痔能進食一周年服之佳七月七九月九可採用治牛馬六畜水穀疫癘諸病方第七十治馬熱蟲顙黑汗鼻有膿啌啌有膿水草不進方黃苽蔞根貝母桔梗小青梔子仁吳藍款冬花大黃白鮮皮黃芩鬱金各二大兩黃蘗馬牙硝各四大兩搗篩患相當及常要啖重者藥三大兩地黃半斤䜴二合蔓菁油四合合齊前啖至晚飼大效䜴葱薑各一兩水五升煮取半升和酒灌之即瘥蟲顙十年者醬清如膽者半合分兩度灌鼻每灌一兩日將息不得多多即損馬也蟲顙重者葶􅏣子一合熬令紫色搗如泥桑根白皮一大握大棗二十枚擘水二升煮藥取一升去滓入葶􅏣搗令調勻適寒溫灌口中隔一日又灌重者不過再瘥蟲顙馬鼻沫出梁腫起者不可治也驢馬胞轉欲死搗蒜內小便孔中深五寸立瘥又用小兒屎和水灌口立瘥又方騎馬走上坂用木腹下來去擦以手內大便孔探却糞大效探法剪却指甲以油塗手恐損破馬腸脊瘡以黃丹傅之避風立瘥疥以大豆熬焦和生麻油搗傅醋泔淨洗目暈以霜後楮葉細末一日兩度管吹眼中即瘥馬蛆蹄槽下立處掘一尺埋雞子許大圓石子令常立上馬遠行到歇處良久與空草熟刷刷罷飲飲竟當飼困時與料必病及水穀六畜瘡焦痂以麵膠封之即落馬急黃黑汗右割取上斷訖取陳久靴爪頭水漬汁灌口如不定用大黃當歸各一兩鹽半升以水三升煎取半升分兩度灌口如不定破尾尖鑱血出即止立效馬起卧胞轉及腸結此方並主之細辛防風芍藥各一兩以鹽一升水五升煮取二升半分為二度灌後灌前用芒硝鬱金寒水石大青各一兩水五升煮取二升半以酒油各半升和攪分二度灌口中馬羯骨脹取四十九根羊蹄燒之尉骨上冷易之如無羊蹄楊栁枝指粗者炙尉之不論數飲馬以寅午二時晚少飲之啖鹽法鹽須乾天須時七日大馬一啖一升小馬半升用長柄杓子深內咽中令下肥而强水草也治馬後冷一兩日永差啖大麻子淨擇一升飼之治啌及毛焦大效疥以樗根末和麻油塗先以皂莢或米泔淨洗之洗了塗令中間空少許放蟲出不得多塗恐瘡大祕療疥以巴豆膩粉研麻油塗定洗之塗數日後看更驗肘後備急方卷八
